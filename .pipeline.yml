            CF_ORG: engineering-enablement
            CF_PASSWORD: ((cloudfoundry.password-snpaas))
            CF_SPACE: integration_test
            CF_USERNAME: ((cloudfoundry.username-snpaas))
          platform: linux
          run:
            args:
              - -c
              - |
                cf login -a $CF_API -u $CF_USERNAME -p $CF_PASSWORD -o $CF_ORG -s $CF_SPACE
