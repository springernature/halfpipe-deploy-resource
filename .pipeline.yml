  - name: push_resource
    plan:
      - get: git
        passed:
          - check_cf
        trigger: true
      - params:
          build: git
          tag_as_latest: true
          tag_file: git/.docker-stable-tag
        put: docker-registry-image-stable
      - params:
          build: git
          tag_as_latest: true
          tag_file: git/.docker-stable-tag
        put: docker-registry-image-stable-dockerhub
    serial: true
resource_types:
  - name: cf-resource
    source:
      password: ((halfpipe-gcr.private_key))
      repository: eu.gcr.io/halfpipe-io/cf-resource-v2-dev
      username: _json_key
    type: registry-image
resources:
  - check_every: 24h0m0s
    name: cf
    source:
      api: ((cloudfoundry.api-snpaas))
      org: engineering-enablement
      password: ((cloudfoundry.password-snpaas))
      space: integration_test
      username: ((cloudfoundry.username-snpaas))
    type: cf-resource
  - name: docker-registry-image-dev
    source:
      password: ((halfpipe-gcr.private_key))
      repository: eu.gcr.io/halfpipe-io/cf-resource-v2-dev
      username: _json_key
    type: docker-image
  - name: docker-registry-image-stable
    source:
      password: ((halfpipe-gcr.private_key))
      repository: eu.gcr.io/halfpipe-io/cf-resource-v2
      tag: stable
      username: _json_key
    type: docker-image
  - name: docker-registry-image-stable-dockerhub
    source:
      password: ((platformengineering-dockerhub.password))
      repository: platformengineering/cf-resource-v2
      username: ((platformengineering-dockerhub.username))
    type: docker-image
  - check_every: 10m0s
    name: git
    source:
      private_key: ((halfpipe-github.private_key))
      uri: git@github.com:springernature/halfpipe-deploy-resource.git
    type: git
var_sources:
  - config:
      auth_backend: approle
      auth_params:
        role_id: ((platform/team-ro-app-role.vault_approle_id))
        secret_id: ((platform/team-ro-app-role.vault_approle_secret_id))
      lookup_templates:
        - '{{.Secret}}'
      path_prefix: gcp/impersonated-account/
      url: ((platform/team-ro-app-role.vault_addr))
    name: gcp
    type: vault
